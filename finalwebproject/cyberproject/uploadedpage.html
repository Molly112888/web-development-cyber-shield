<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Cyber Shield | Uploaded Lessons</title>

  <style>
    /* Base layout */
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: url("bjjimage.png") center / cover no-repeat fixed;
      color: #f0f0ff;
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh;
    }

    /* Card container */
    .card {
      width: 900px;
      background: rgba(15,15,35,0.92);
      backdrop-filter: blur(10px);
      padding: 30px; margin-top: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      text-align: center;
    }

    /* Header logo */
    header { margin-bottom: 20px; }
    header img {
      width: 120px;
      border-radius: 50%;
      box-shadow: 0 10px 30px rgba(53,198,255,0.7);
    }

    /* Headings */
    h1 { color: #7d47ff; font-size: 32px; margin-bottom: 20px; }

    /* Lesson cards */
    .lesson {
      background: rgba(20,20,40,0.85);
      padding: 18px; margin: 18px 0;
      border-radius: 12px; text-align: left;
    }
    .lesson h3 { color: #35c6ff; font-size: 22px; margin-bottom: 10px; }
    .lesson p { color: #e0e0ff; font-size: 16px; }
    .lesson small { color: #a78bff; font-size: 13px; }
    .lesson:hover { box-shadow: 0 0 12px rgba(53,198,255,0.6); }

    /* Logout button */
    .logout-btn {
      margin-top: 20px; padding: 10px 16px;
      border: none; border-radius: 6px;
      background: linear-gradient(135deg, #7d47ff, #35c6ff);
      color: white; font-size: 15px; cursor: pointer;
    }
    .logout-btn:hover { box-shadow: 0 0 10px #35c6ff; }
		@media (max-width: 600px) {
  body {
    padding: 10px;
    font-size: 14px;
  }
  table th, table td {
    padding: 8px;
    font-size: 12px;
  }
  button {
    width: 100%; /* ✅ buttons stretch full width on mobile */
    margin-top: 10px;
  }
  h1 {
    font-size: 20px;
    text-align: center;
  }
  footer {
    text-align: center;
    font-size: 12px;
    margin-top: 20px;
    word-wrap: break-word;
}
  </style>
</head>

<body>
  <div class="card">
    <!-- Logo -->
    <header><img src="logo.jpeg" alt="Organization Logo"></header>

    <!-- Page title -->
    <h1>Uploaded Lessons</h1>

    <!-- Lessons list -->
    <div id="lesson-list"></div>

    <!-- Logout -->
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <script>
    // Load lessons from localStorage
    let lessons = JSON.parse(localStorage.getItem("cs_lessons")) || [];

    // Render lessons list
    function renderLessons() {
      const container = document.getElementById("lesson-list");
      container.innerHTML = "";
      if (lessons.length === 0) {
        container.innerHTML = "<p>No lessons uploaded yet.</p>";
        return;
      }
      lessons.forEach(l => {
        const div = document.createElement("div");
        div.className = "lesson";
        div.innerHTML = `
          <h3>${l.title}</h3>
          <p>${l.content}</p>
          <small>Uploaded at: ${l.createdAt}</small>
        `;
        container.appendChild(div);
      });
    }
    renderLessons();

    // Logout redirect
    function logout() {
      alert("Stay tuned for more lessons. Bye!");
      window.location.href = "homepage.html";
    }
  </script>
</body>
<footer>© 2026 CyberShield · South Africa · All rights reserved</footer>
</html>
